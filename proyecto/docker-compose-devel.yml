services:

  ssdd-frontend:
    build:
      context: frontend
      dockerfile: Dockerfile-devel
    ports:
      - 5010:5010
    env_file: sql.env
    environment:
      - FLASK_APP=app/app.py
      - FLASK_DEBUG=true
      - PORT=5010
      - PROMPT_SERVICE_URL=http://backend-rest:8080/Service/chat
    volumes:
      - ./frontend:/ssdd-frontend
    depends_on:
      db-mysql:
        condition: service_healthy

  ssdd-llamachat:
    image: dsevilla/ssdd-llamachat-dummy:1.0
    ports:
      - 5020:5020

  db-mysql:
    build: db-mysql/.
    ports:
      - 3306:3306
    env_file: sql.env
    healthcheck:
      test: echo 'SELECT 1' | mysql -h db-mysql -u root -p$$MYSQL_ROOT_PASSWORD $$MYSQL_DATABASE
      interval: 10s
      timeout: 10s
      retries: 7
      start_period: 20s

  backend-rest:
    build: backend-rest/es.um.sisdist.backend.Service/.
    ports:
      - 8080:8080
    env_file: sql.env
    depends_on:
      db-mysql:
        condition: service_healthy

  backend-grpc:
    build: backend-grpc/es.um.sisdist.backend.grpc.GrpcServiceImpl/.
    ports:
      - 50051:50051
    env_file: sql.env
    environment:
      - LLAMACHAT_SERVICE_URL=http://ssdd-llamachat:5020/prompt
    depends_on:
      db-mysql:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - ssdd-frontend
